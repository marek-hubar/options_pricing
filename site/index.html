<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>American Option Pricer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="container">
    <div id="controls">
      <h2>Option Parameters</h2>

      <label for="pricing-model">Pricing Model</label>
      <select id="pricing-model">
        <option value="0">European</option>
        <option value="1" selected>American</option>
      </select>

      <label for="option-type">Option Type</label>
      <select id="option-type">
        <option value="0">Call</option>
        <option value="1" selected>Put</option>
      </select>

      <label for="strike">Strike Price (K)</label>
      <input type="number" id="strike" value="100" min="0.01" step="any">

      <label for="expiration">Expiration T (years)</label>
      <input type="number" id="expiration" value="1" min="0.01" step="any">

      <h2>Market Parameters</h2>

      <label for="spot">Underlying Price (S₀)</label>
      <input type="number" id="spot" value="100" min="0.01" step="any">

      <label for="sigma">Volatility σ</label>
      <input type="number" id="sigma" value="0.2" min="0.01" max="5" step="any">

      <label for="rate">Risk-free Rate r</label>
      <input type="number" id="rate" value="0.05" min="0" max="1" step="any">

      <h2>Grid Resolution</h2>

      <label for="spatial-res">Spatial Nodes: <span id="spatial-res-val">50</span></label>
      <input type="range" id="spatial-res" value="50" min="5" max="200" step="1">

      <label for="temporal-res">Time Steps: <span id="temporal-res-val">200</span></label>
      <input type="range" id="temporal-res" value="200" min="2" max="500" step="1">

      <button id="price-btn" disabled>Loading WASM...</button>

      <div id="loading" class="hidden">Computing...</div>
      <div id="error-display" class="hidden"></div>
    </div>

    <div id="results">
      <div id="price-display">Option Price: &mdash;</div>
      <div id="surface-plot"></div>
    </div>
  </div>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <script src="script.js"></script>
  <script src="pricer.js"></script>
</body>
</html>
